version: 2

models:
  - name: stg_synth__patients
    description: "Synthetic patient demographics anchored on real 1KG samples."
    columns:
      - name: patient_id
        tests: [not_null, unique]
      - name: sample_id_1kg
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_1kg__samples')
                field: sample_id
      - name: stage_at_diagnosis
        tests:
          - accepted_values:
              arguments:
                values: ['I', 'II', 'III', 'IV']
      - name: sex_at_birth
        tests:
          - accepted_values:
              arguments:
                values: ['male', 'female']
      - name: ancestry_super_population
        tests:
          - accepted_values:
              arguments:
                values: ['AFR', 'AMR', 'EAS', 'EUR', 'SAS']

  - name: stg_synth__panels
    description: "Personalized panels: ~16 variants per patient."
    columns:
      - name: panel_id
        tests: [not_null]
      - name: patient_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_synth__patients')
                field: patient_id
      - name: variant_key
        tests: [not_null]
      - name: simulated_tumor_vaf
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

  - name: stg_synth__mrd_tests
    description: "Serial MRD test events per patient."
    columns:
      - name: test_id
        tests: [not_null, unique]
      - name: patient_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_synth__patients')
                field: patient_id
      - name: panel_id
        tests: [not_null]
      - name: is_positive
        tests: [not_null]
      - name: days_since_surgery
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

  - name: stg_synth__mrd_detections
    description: "Per-panel-variant detection signal at each MRD test."
    columns:
      - name: detection_id
        tests: [not_null, unique]
      - name: test_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_synth__mrd_tests')
                field: test_id
      - name: patient_id
        tests: [not_null]
      - name: variant_key
        tests: [not_null]
      - name: vaf_blood
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

  - name: stg_synth__clinical_events
    description: "Clinical events: diagnosis, surgery, chemo, recurrence."
    columns:
      - name: event_id
        tests: [not_null, unique]
      - name: patient_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_synth__patients')
                field: patient_id
      - name: event_type
        tests:
          - accepted_values:
              arguments:
                values: ['diagnosis', 'surgery', 'chemotherapy_start', 'recurrence', 'imaging', 'death']
